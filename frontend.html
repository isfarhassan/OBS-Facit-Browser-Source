<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  margin:0;
  background:transparent;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
}

.overlay {
  position:absolute;
  top:20px;
  right:20px;
  width:310px;
  padding:18px 18px 16px;
  border-radius:18px;
  background:radial-gradient(circle at top left,#1f2937 0,#020617 55%,#000 100%);
  border:1px solid rgba(234,179,8,0.9);
  box-shadow:0 0 0 1px rgba(250,250,250,0.03),0 18px 45px rgba(0,0,0,0.8),0 0 30px rgba(250,204,21,0.34);
  color:#f9fafb;
  opacity:0.94;
}

.title {
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  font-size:16px;
  letter-spacing:0.05em;
  text-transform:uppercase;
  color:#facc15;
  padding-bottom:6px;
  border-bottom:1px solid rgba(148,163,184,0.35);
  margin-bottom:10px;
}

.rank {
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:8px;
}

.rank img {
  width:46px;
  height:46px;
  border-radius:999px;
  box-shadow:0 0 0 2px rgba(250,204,21,0.8),0 10px 22px rgba(0,0,0,0.85);
}

.stat {
  display:flex;
  justify-content:space-between;
  margin:4px 0;
  font-size:13px;
  color:#e5e7eb;
}

.stat span:first-child {
  text-transform:uppercase;
  letter-spacing:0.09em;
  font-size:11px;
  color:#9ca3af;
}

.stat span:last-child {
  font-weight:600;
  color:#f9fafb;
}

.elo {
  margin-top:6px;
  text-align:center;
  font-size:22px;
  font-weight:700;
  letter-spacing:0.22em;
  text-transform:uppercase;
  color:#facc15;
  text-shadow:0 0 18px rgba(250,204,21,0.68);
}

.recent {
  margin-top:10px;
  font-size:11px;
  line-height:1.5;
  color:#e5e5e5;
}

.recent-title {
  color:#9ca3af;
  margin-right:4px;
  text-transform:uppercase;
  letter-spacing:0.11em;
}

.recent-summary {
  margin-right:6px;
}

.recent-num {
  font-weight:600;
  color:#f9fafb;
}

.recent-seq .wl-w,
.recent-summary .wl-w {
  color:#4ade80;
  font-weight:700;
}

.recent-seq .wl-l,
.recent-summary .wl-l {
  color:#f97373;
  font-weight:700;
}

.recent-empty {
  color:#6b7280;
}

.recent-seq {
  letter-spacing:0.08em;
}
</style>
</head>

<body>

<div class="overlay">
  <div class="title">LordSaint</div>

  <div class="rank">
    <img id="rankIcon" src="">
  </div>

  <div class="stat"><span>KD</span><span id="kd">--</span></div>
  <div class="stat"><span>Winrate</span><span id="winrate">--</span></div>
  <div class="stat"><span>Matches</span><span id="matches">--</span></div>

  <div class="elo" id="elo">ELO: --</div>

  <div class="recent" id="recentBlock">Loading...</div>
</div>

<script>
const USERNAME = "LordSaint";
const API_STATS_URL = "https://obs-facit-browser-source.vercel.app/api/faceitstats";

function renderRecent(recent) {
  const el = document.getElementById("recentBlock");
  if (!recent || !Array.isArray(recent) || recent.length === 0) {
    el.innerHTML =
      '<span class="recent-title">Last 10 Games:</span> <span class="recent-empty">—</span>';
    return;
  }
  let wins = 0;
  let losses = 0;
  for (let i = 0; i < recent.length; i++) {
    if (recent[i] === "W") wins++;
    else if (recent[i] === "L") losses++;
  }
  const seq = [];
  for (let i = 0; i < recent.length; i++) {
    const r = recent[i];
    seq.push(
      r === "W"
        ? '<span class="wl-w">W</span>'
        : '<span class="wl-l">L</span>'
    );
  }
  el.innerHTML =
    '<span class="recent-title">Last 10 Games:</span> ' +
    '<span class="recent-summary">' +
    '<span class="recent-num">' +
    wins +
    '</span> <span class="wl-w">W</span> ' +
    '<span class="recent-num">' +
    losses +
    '</span> <span class="wl-l">L</span></span> ' +
    '<span class="recent-seq">' +
    seq.join(" ") +
    "</span>";
}

async function loadStats() {
  const recentEl = document.getElementById("recentBlock");
  try {
    const url = new URL(API_STATS_URL);
    url.searchParams.set("user", USERNAME);
    const res = await fetch(url.toString());
    const data = await res.json();
    if (!res.ok) {
      recentEl.innerText = data.error ? String(data.error) : "Request failed";
      return;
    }
    const eloRaw = data.elo;
    const elo =
      eloRaw == null
        ? null
        : typeof eloRaw === "number"
          ? eloRaw
          : Number(eloRaw);
    document.getElementById("elo").innerText =
      elo == null || Number.isNaN(elo) ? "ELO: --" : "ELO: " + elo;
    const kd = data.kd;
    document.getElementById("kd").innerText = kd == null ? "--" : String(kd);
    const wr = data.winrate;
    if (wr == null) {
      document.getElementById("winrate").innerText = "--";
    } else {
      const s = String(wr);
      document.getElementById("winrate").innerText = s.includes("%") ? s : s + "%";
    }
    const m = data.matches;
    document.getElementById("matches").innerText = m == null ? "--" : String(m);
    const rankIcon = document.getElementById("rankIcon");
    if (elo == null || Number.isNaN(elo)) {
      rankIcon.removeAttribute("src");
      rankIcon.style.display = "none";
    } else {
      rankIcon.style.display = "block";
      let level = Math.floor(elo / 200);
      if (level > 10) level = 10;
      if (level < 1) level = 1;
      rankIcon.src =
        "https://distribution.faceit-cdn.net/images/levels/" + level + ".png";
    }
    renderRecent(data.recent);
  } catch {
    recentEl.innerText = "Unavailable";
  }
}

loadStats();
setInterval(loadStats, 20000);
</script>

</body>
</html>
