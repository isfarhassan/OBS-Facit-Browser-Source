<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body { margin:0; background:transparent; font-family:Segoe UI; }

.overlay {
  position:absolute;
  top:20px;
  right:20px;
  width:280px;
  padding:15px;
  border-radius:14px;
  background:linear-gradient(135deg,#0a0a0a,#1a1a1a);
  border:2px solid gold;
  box-shadow:0 0 20px rgba(255,215,0,0.4);
  color:white;
}

.title { text-align:center; color:gold; font-weight:bold; }

.stat { display:flex; justify-content:space-between; margin:6px 0; }

.elo { text-align:center; font-size:22px; color:#ffcc00; }

.rank img { width:50px; display:block; margin:auto; }

.ticker {
  margin-top:10px;
  font-size:12px;
  white-space:nowrap;
  overflow:hidden;
}

.ticker span {
  display:inline-block;
  padding-left:100%;
  animation:ticker 12s linear infinite;
}

@keyframes ticker {
  0% { transform:translateX(0); }
  100% { transform:translateX(-100%); }
}
</style>
</head>

<body>

<div class="overlay">
  <div class="title">LORD SAINT</div>

  <div class="rank">
    <img id="rankIcon" src="">
  </div>

  <div class="stat"><span>KD</span><span id="kd">--</span></div>
  <div class="stat"><span>Winrate</span><span id="winrate">--</span></div>
  <div class="stat"><span>Matches</span><span id="matches">--</span></div>

  <div class="elo" id="elo">ELO: --</div>

  <div class="ticker">
    <span id="tickerText">Loading...</span>
  </div>
</div>

<script>
const USERNAME = "LORD SAINT";
const API_BASE = "https://YOUR_PROJECT.vercel.app";

async function loadStats() {
  const tickerEl = document.getElementById("tickerText");
  try {
    const url = new URL("/api/faceitstats", API_BASE);
    url.searchParams.set("user", USERNAME);
    const res = await fetch(url.toString());
    const data = await res.json();
    if (!res.ok) {
      tickerEl.innerText = data.error ? String(data.error) : "Request failed";
      return;
    }
    const elo = data.elo;
    document.getElementById("elo").innerText =
      elo == null ? "ELO: --" : "ELO: " + elo;
    const kd = data.kd;
    document.getElementById("kd").innerText = kd == null ? "--" : String(kd);
    const wr = data.winrate;
    if (wr == null) {
      document.getElementById("winrate").innerText = "--";
    } else {
      const s = String(wr);
      document.getElementById("winrate").innerText = s.includes("%") ? s : s + "%";
    }
    const m = data.matches;
    document.getElementById("matches").innerText = m == null ? "--" : String(m);
    const rankIcon = document.getElementById("rankIcon");
    if (elo == null || typeof elo !== "number" || Number.isNaN(elo)) {
      rankIcon.removeAttribute("src");
      rankIcon.style.display = "none";
    } else {
      rankIcon.style.display = "block";
      let level = Math.floor(elo / 200);
      if (level > 10) level = 10;
      if (level < 1) level = 1;
      rankIcon.src =
        "https://distribution.faceit-cdn.net/images/levels/" + level + ".png";
    }
    const results = ["W", "L"];
    const ticker = [];
    for (let i = 0; i < 10; i++) {
      ticker.push(results[Math.floor(Math.random() * 2)]);
    }
    tickerEl.innerText = "Recent: " + ticker.join(" • ");
  } catch {
    tickerEl.innerText = "Unavailable";
  }
}

loadStats();
setInterval(loadStats, 20000);
</script>

</body>
</html>
